# Companion loginexa smoke for C6-3D-LDDPM alone.
#
# C6 is excluded from the main smoke because its selection NFE is 1000: at
# ~400 s/scan on a V100 that is ~53 min for 8 cohorts, over the login-node
# wallclock cap.
#
# This config therefore overrides NFE to 5 and sweeps all 8 cohorts (~2 min).
# That is the right coverage for a smoke: what is cohort-specific is the data
# path (latent read -> sample -> decode -> harmonise -> H5), and NFE=1000 is the
# SAME sampler loop with more iterations — it cannot fail per-cohort in a way
# NFE=5 does not. The expensive path is exercised separately, on one cohort, by
# smoke_loginexa_c6_nfe1000.yaml, and for real in the picasso_shard_d_lddpm job.
#
# Writes to the same `run_id_tag` as the main smoke so the C6 H5s merge into the
# unified predictions tree.

run_id_tag: smoke_loginexa
output_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/inference
corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
models_yaml: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/inference/configs/models/benchmark_full.yaml
fold: 0
device: cuda:0
warmup_passes: 0

cohorts:
  cv_test: [UCSF-PDGM, BraTS-GLI, IvyGAP, LUMIERE, REMBRANDT, UPENN-GBM]
  test_only: [BraTS-Africa-Glioma, BraTS-Africa-Other]
  exclude: []

methods:
  include: [C6-3D-LDDPM]
  exclude: []

smoke:
  enabled: true
  n_patients_per_cohort: 1
  use_selection_nfe_only: true

# Override C6's selection NFE (1000) down to 5 — see the header. Keeps the
# 8-cohort sweep inside the login-node wallclock.
nfe_override: [5]

figure:
  enabled: false  # The main unified-env smoke renders the cross-method
                  # figure; this companion only adds C6 H5s to the tree.

log_level: INFO
