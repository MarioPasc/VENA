# Companion loginexa smoke for C6-3D-LDDPM alone — NFE=1000 on V100 costs
# ~400 s/scan, so 8 cohorts × 1 patient ≈ 53 min (over the 30-min loginexa
# wallclock). Run this **on its own loginexa session** so the timeout only
# bounds C6's run, not the whole pipeline.
#
# If wallclock fails on loginexa, run the same YAML on server-3 (no time
# limit) via the `server3` skill.
#
# Writes to the same `run_id_tag` as the main smoke so the C6 H5s merge
# into the unified predictions tree.

run_id_tag: smoke_loginexa
output_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/inference
corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
models_yaml: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/inference/configs/models/benchmark_full.yaml
fold: 0
device: cuda:0
warmup_passes: 0

cohorts:
  cv_test: [UCSF-PDGM, BraTS-GLI, IvyGAP, LUMIERE, REMBRANDT, UPENN-GBM]
  test_only: [BraTS-Africa-Glioma, BraTS-Africa-Other]
  exclude: []

methods:
  include: [C6-3D-LDDPM]
  exclude: []

smoke:
  enabled: true
  n_patients_per_cohort: 1
  use_selection_nfe_only: true

nfe_override: null

figure:
  enabled: false  # The main unified-env smoke renders the cross-method
                  # figure; this companion only adds C6 H5s to the tree.

log_level: INFO
