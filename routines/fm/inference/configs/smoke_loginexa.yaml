# Loginexa smoke — validates the pipeline shape on Picasso's V100-DGXS-32GB GPU
# login node (~30-min wallclock, no queue) BEFORE submitting the sharded A100
# inference jobs. Run the routine directly; there is no sbatch here.
#
# Scope: 1 patient per cohort x 8 cohorts x every included method-row x ONLY
# each method's selection NFE. This is the "one image per dataset per method"
# gate: it proves every adapter loads its checkpoint, resolves its run_dir
# siblings, samples, decodes, and writes a valid predictions H5.
#
# Writes under its own run_id_tag, so smoke output never pollutes the real
# benchmark tree even though it shares output_root.
#
# TWO ROWS ARE EXCLUDED HERE, both for mechanical reasons, both smoked separately:
#
#   C3-SynDiff x3 — needs the `vena-syndiff` env (Python 3.10, torch 2.5.1+cu121,
#     JIT-compiled fused/upfirdn2d CUDA extensions) which will not load under the
#     `vena` env. Smoke via smoke_loginexa_syndiff.yaml.
#
#   C6-3D-LDDPM — selection_nfe=1000 costs ~400 s/patient on a V100, so 8 cohorts
#     is ~53 min, over the login-node wallclock cap. Smoke via
#     smoke_loginexa_c6_only.yaml (or on server-3, where wallclock is unbounded).
#
# Everything else runs here, including all four VENA rows.

run_id_tag: smoke_loginexa
output_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/inference
corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
models_yaml: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/inference/configs/models/benchmark_full.yaml
fold: 0
device: cuda:0
# No warmup in the smoke — we are validating shape, not timing.
warmup_passes: 0

cohorts:
  cv_test: [UCSF-PDGM, BraTS-GLI, IvyGAP, LUMIERE, REMBRANDT, UPENN-GBM]
  test_only: [BraTS-Africa-Glioma, BraTS-Africa-Other]
  exclude: []

methods:
  include: null
  exclude: [C3-SynDiff-t1pre, C3-SynDiff-t2, C3-SynDiff-flair, C6-3D-LDDPM]

smoke:
  enabled: true
  n_patients_per_cohort: 1
  use_selection_nfe_only: true

nfe_override: null

figure:
  enabled: true
  n_slices: 7
  slice_offset: 10

log_level: INFO
