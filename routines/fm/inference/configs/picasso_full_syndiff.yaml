# Picasso A100 inference for SynDiff (C3) only — companion to picasso_full.yaml.
#
# This file targets the SynDiff vena-syndiff env: Python 3.10 + torch
# 2.5.1+cu121 + ninja + the JIT-compiled fused/upfirdn2d CUDA extensions.
# Mirrors the env-switch pattern used by SynDiff training at
# `routines/competitors/syndiff/slurm/runs/worker_syndiff_picasso_full_*.sh`.
#
# Shares `run_id_tag` with picasso_full.yaml so per-method predictions land
# under the same `<output_root>/<run_id_tag>/predictions/` tree and merge
# automatically.

run_id_tag: picasso_full
output_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/benchmarks/inference
corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
models_yaml: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/inference/configs/models/benchmark_full.yaml
fold: 0
device: cuda:0
warmup_passes: 5

cohorts:
  cv_test: [UCSF-PDGM, BraTS-GLI, IvyGAP, LUMIERE, REMBRANDT, UPENN-GBM]
  test_only: [BraTS-Africa-Glioma, BraTS-Africa-Other]
  exclude: []

methods:
  include: [C3-SynDiff-t1pre, C3-SynDiff-t2, C3-SynDiff-flair]
  exclude: []

smoke:
  enabled: false
  n_patients_per_cohort: 1
  use_selection_nfe_only: false

# SynDiff is 4-step DDPM reverse — nfe_list pinned to [4] in the registry.
nfe_override: null

# Disabled — the main picasso_full.yaml run renders the unified
# cross-method figure; this companion only adds SynDiff H5s to the tree.
figure:
  enabled: false
  n_slices: 7
  slice_offset: 10

log_level: INFO
