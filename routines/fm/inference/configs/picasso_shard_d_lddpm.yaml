# Shard D — C6-3D-LDDPM only. THE WALLCLOCK LONG POLE.
#
# See picasso_shard_a_cheap.yaml for the sharding rationale. C6 gets a dedicated
# job precisely because it dominates: nfe_list {5,10,20,1000} = 1035 sampler
# steps/patient, versus 38 for a VENA row. NFE=1000 is the paper-faithful
# Ho et al. 2020 default and stays C6's headline selection point; the {5,10,20}
# points give the common-NFE Pareto row against RFlow/VENA (the RFlow-vs-DDPM
# few-step advantage, Eidex 2025 §5).
#
# 393 test patients x 1 row. Estimated ~26-36 h — hence --time=3-00:00:00 in the
# launcher. Isolating it means a failure in any other shard costs hours, not days.

run_id_tag: picasso_shard_d_lddpm
output_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/inference
corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
models_yaml: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/inference/configs/models/benchmark_full.yaml
fold: 0
device: cuda:0
warmup_passes: 5

cohorts:
  cv_test: [UCSF-PDGM, BraTS-GLI, IvyGAP, LUMIERE, REMBRANDT, UPENN-GBM]
  test_only: [BraTS-Africa-Glioma, BraTS-Africa-Other]
  exclude: []

methods:
  include: [C6-3D-LDDPM]
  exclude: []

smoke:
  enabled: false
  n_patients_per_cohort: 1
  use_selection_nfe_only: false

nfe_override: null

figure:
  enabled: true
  n_slices: 7
  slice_offset: 10

log_level: INFO
