# S1 smoke config — server3 paths, 50 steps, batch 1, 4 subjects.
# Goal: prove the pipeline runs end-to-end, loss is finite and trends down.
seed: 42
site: server3
stage: S1
artifact_root: /media/hddb/mario/artifacts/vena/fm.train
run_name: smoke

data:
  latents_h5: /media/hddb/mario/data/GLIOMAS/UCSF_PDGM/h5/UCSFPDGM_latents.h5
  fold: 0
  batch_size: 1
  num_workers: 2
  pin_memory: true
  max_train_subjects: 4

trunk:
  checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
  class_token: 9
  spacing_mm: [1.0, 1.0, 1.0]

controlnet:
  conditioning_inputs:
    - latent:t1pre
    - latent:t2
    - latent:flair
    - mask:wt:identity
  arch_overrides: {}
  perturb_keys: ["wt"]

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 5
  scheduler: polynomial

trainer:
  max_steps: 50
  precision: bf16-mixed
  devices: 1
  accelerator: auto
  strategy: auto
  log_every_n_steps: 1
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  deterministic: false
