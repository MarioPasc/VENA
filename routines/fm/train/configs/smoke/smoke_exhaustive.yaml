# S1 exhaustive-validation verification smoke.
#   • cuda:0 trains only (loss-based ema_best); validation fully offloaded.
#   • exhaustive image-space validation EVERY epoch on cuda:1 (stress test;
#     real runs use every_epochs ~20). 4 patients x NFE {1,10,50}: sample ->
#     decode -> PSNR/SSIM vs real T1c -> best/worst figures -> latent_preds.h5.
#   • 16 steps -> 4 epochs (4 train subjects, batch 1, grad_accum 1).
# Acceptance: both GPUs busy simultaneously (see exhaustive_val/gpu_usage.log).

run:
  stage: s1
  resume_from: null
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  latents_h5: /media/hddb/mario/data/GLIOMAS/UCSF_PDGM/h5/UCSFPDGM_latents.h5
  fold: 0
  batch_size: 1
  num_workers: 2
  pin_memory: true
  max_train_subjects: 8
  max_val_subjects: 8

model:
  trunk:
    checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: ["wt"]
  vae_checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 5
  scheduler: polynomial

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 32
  batch_size: 1
  grad_accum: 1
  checkpoint_every_epochs: 1
  log_train_every_steps: 1
  gradient_clip_val: 1.0

exhaustive_val:
  enabled: true
  every_epochs: 1
  n_patients: 4
  nfe_levels: [1, 10, 50]
  image_h5: /media/hddb/mario/data/GLIOMAS/UCSF_PDGM/h5/UCSFPDGM_image.h5
  device: cuda:1

output:
  experiments_root: /media/hddb/mario/experiments
  retention_n_checkpoints: 4
  tensorboard: false
  wandb: false
