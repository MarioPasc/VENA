# Frozen-trunk arm (server3, icai-server) — DUAL RTX 4090 24 GB.
# Baseline for the frozen-vs-unfrozen A/B: IDENTICAL to
# server3_trunk_unfrozen.yaml except model.trunk.trainable: false (canonical
# frozen-backbone ControlNet recipe). Same data, optimiser, EMA, schedule, and
# exhaustive-val settings so the only varying factor is whether the trunk is
# fine-tuned. Training on cuda:0; exhaustive val on cuda:1 (both GPUs visible).

run:
  stage: s1
  resume_from: null
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  latents_h5: /media/hddb/mario/data/GLIOMAS/UCSF_PDGM/h5/UCSFPDGM_latents.h5
  fold: 0
  batch_size: 1
  num_workers: 4
  pin_memory: true
  max_train_subjects: null
  max_val_subjects: null

model:
  trunk:
    checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: false         # frozen-trunk baseline arm
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: ["wt"]
  vae_checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 100
  scheduler: polynomial

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 100000        # high cap; max_epochs governs this run
  max_epochs: 4
  batch_size: 1
  grad_accum: 2
  checkpoint_every_epochs: 1
  log_train_every_steps: 25
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0

validation:
  every_epochs: 1
  per_epoch_nfe: 5
  full_sweep_every_epochs: 5
  sweep_nfes: [1, 2, 5, 10, 50]
  qualitative_every_epochs: 10
  image_metrics: true

exhaustive_val:
  enabled: true
  every_epochs: 1
  n_patients: 10
  nfe_levels: [1, 10, 50]
  image_h5: /media/hddb/mario/data/GLIOMAS/UCSF_PDGM/h5/UCSFPDGM_image.h5
  device: cuda:1

output:
  experiments_root: /media/hddb/mario/experiments
  retention_n_checkpoints: 5
  tensorboard: false
  wandb: false

regions:
  brain:
    source: fallback_all_ones
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
