# Server-3 smoke (3 epochs) — S2 with LoRA r=16 + the v0.4 region-weighted
# contrastive (m_brain ∩ ¬m_wt, p=2, weight=0.1).
#
# Validates:
#   * masks/brain_latent is loaded by LatentH5Dataset (the encoder routine
#     `vena-encode-brain-to-latent` must have been run on every server-3
#     cohort first).
#   * train_step.csv carries the new aux columns:
#       contrastive
#       contrastive/term_healthy_lp_mean
#       contrastive/term_healthy_voxel_frac
#       contrastive/residual_lp_mean_healthy
#       contrastive/healthy_voxel_frac
#       contrastive/residual_lp_mean_wt
#     and NONE of the v0.3 keys (lambda_roi/delta/roi_cap_hit_frac/...).
#   * train/contrastive_mean > 0 (Lp residual is non-negative).
#   * EMA tracks normally; gradients flow through trunk + ControlNet + LoRA.

run:
  stage: s2
  resume_from: null
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_server3.json
  fold: 0
  batch_size: 2
  num_workers: 4
  pin_memory: true
  tau: 0.5
  max_train_subjects: 200
  augmentation_config_path: routines/fm/train/configs/augmentations/equivariant_v1.yaml
  preflight_decision_path: /media/hddb/mario/artifacts/latent_aug_equivariance/LATEST/decision.json
  dedup_decisions_path: /media/hddb/mario/artifacts/preflights/cohort_dedup/LATEST/decision.json

model:
  trunk:
    checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
    regime: peft
    peft:
      variant: lora
      params:
        r: 16
        alpha: 16
        dropout: 0.0
        target_modules: ["to_q", "to_k", "to_v", "out_proj"]
        bias: "none"
        init_lora_weights: "gaussian"
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: []
  vae_checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2
  contrastive:
    weight: 0.1
    terms:
      - {name: healthy, region: healthy, p: 2.0, weight: 1.0}

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: logit-normal

optim:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 30
  scheduler: cosine

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 300
  max_epochs: 3
  batch_size: 2
  grad_accum: 1
  checkpoint_every_epochs: 1
  log_train_every_steps: 5
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 2, 5, 10, 20]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: true
  every_epochs: 1
  n_patients: 6
  nfe_levels: [1, 5]
  integrator: euler
  corpus_registry: routines/fm/train/configs/corpus/corpus_server3.json
  device: cuda:1
  block_until_complete: true
  figure_top_k: 2

output:
  experiments_root: /media/hddb/mario/experiments/smoke
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: latents_h5
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
