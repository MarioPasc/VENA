# Loginexa 4-epoch smoke — S1 + FFT trunk (CFM-only).
#
# Mirrors routines/fm/train/configs/runs/picasso_s1_1000ep_fft.yaml under
# loginexa constraints (2× V100-DGXS-32GB, 30-min hard wallclock).
#
# Differences from production (smoke-only):
#   * max_epochs=4 + total_steps=600 — total_steps is the cosine horizon AND
#     PL max_steps; set above 4-epoch step count so max_epochs binds first
#   * warmup_steps=40 (was 1000) so cosine decay completes inside the smoke
#   * max_train_patients_per_cohort=10 caps each of the 6 CV cohorts so
#     4 epochs + 4 exhaustive_val rounds fit under the 25-min timeout
#   * batch_size=2 (was 4) for V100 32GB headroom; grad_accum=1
#   * exhaustive_val every epoch, n_patients=3, NFE [1,5], block_until_complete=true
#   * experiments_root in execs/VENA (where the user verifies smoke output)
#   * resume_from=null — every smoke is a fresh run

run:
  stage: s1
  # Required by ``_RunCfg`` schema; mirrors the production recipe tag so the
  # smoke exercises the same run_id format the engine emits on Picasso.
  tag: fft_cfm
  resume_from: null
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  batch_size: 2
  num_workers: 4
  pin_memory: true
  tau: 0.5
  # `max_train_subjects` was a vestigial config field (never read by the engine).
  # The functional knob is `max_train_patients_per_cohort` — caps EACH CV cohort
  # to N patients post-dedup. With N=10 and 6 cv cohorts → ~60 patients, but
  # LUMIERE is longitudinal (~6 scans/patient) so total ≈ 110-150 scans.
  # At batch_size=2 that gives ~55-75 batches/epoch ⇒ 4 epochs in 220-300 steps.
  # Without this, the data module yields 1664 train scans → 832 steps/epoch and
  # max_steps=total_steps fires long before max_epochs=4, skipping every
  # epoch-end hook (including exhaustive_val). Empirically N=20 fits ≈30 min
  # (over budget); N=10 fits ≈15-18 min wallclock.
  max_train_patients_per_cohort: 10
  # Online augmentation disabled — see production YAML comment.
  augmentation_config_path: null
  preflight_decision_path: null
  dedup_decisions_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json
  use_offline_augmented_data: true
  variant_weights:
    v0: 0.2
    v1: 0.2
    v2: 0.2
    v3: 0.2
    v4: 0.2

model:
  trunk:
    checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
    regime: fft
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      # S1 v2: WT-mask slot reserved-but-zero. See production YAML.
      - mask:wt:zero_out
    arch_overrides: {}
    perturb_keys: []
    output_scale_ramp:
      enabled: true
      # 200 ≪ 5000 so the smoke's 4 epochs ≈ 360 steps actually exercise the
      # ramp midpoint and completion (would otherwise stay near 0 the whole run).
      ramp_steps: 200
      steepness: 10.0
  vae_checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l1

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: logit-normal
  use_timestep_transform: true
  base_img_size_numel: 129024

optim:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 40
  scheduler: cosine

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  # 600 = scheduler horizon (cosine annealing target) AND PL max_steps. Set
  # above the expected 4-epoch step count (~360) so max_epochs binds first
  # and every epoch-end hook (incl. exhaustive_val) fires.
  total_steps: 600
  max_epochs: 4
  batch_size: 2
  grad_accum: 1
  checkpoint_every_epochs: 1
  log_train_every_steps: 10
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0
  patience: 100

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 2, 5, 10, 20]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: true
  every_epochs: 1
  n_patients: 3
  nfe_levels: [1, 5]
  integrator: euler
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  device: cuda:1
  block_until_complete: true
  figure_top_k: 2

output:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/VENA
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: latents_h5
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
