# S1 4-epoch smoke with the cohort_dedup preflight wired in.
#
# Identical to smoke_s1_4ep_logging.yaml except:
#   * data.corpus_registry -> local paths (corpus_local.json)
#   * data.dedup_decisions_path -> the cohort_dedup preflight artifact
#     (BraTS-GLI > UCSF-PDGM > IvyGAP > LUMIERE priority drops the 293
#     overlapping UCSF-PDGM patients before the DataLoader sees them)
#   * checkpoint / VAE paths -> local Sandisk2TB mirror
#   * augmentation gate path -> local LATEST (may not be present on a fresh
#     machine; augmentation is OFF in this run to make the dedup the only
#     load-bearing pre-flight under test)
#   * exhaustive_val OFF (the 8 GB RTX 4060 cannot host the second GPU job)
#
# Launch from the repo root:
#   vena-fm-train routines/fm/train/configs/runs/smoke_s1_4ep_dedup.yaml

run:
  stage: s1
  resume_from: null
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_local.json
  fold: 0
  batch_size: 1
  num_workers: 2
  pin_memory: true
  tau: 0.5
  # Cap the per-cohort train patient list for the 4-epoch smoke so each epoch
  # runs in minutes on an 8 GB / 12 GB GPU.
  max_train_patients_per_cohort: 4
  # Cohort-deduplication gate. Required: the LATEST dedup decision must exist.
  dedup_decisions_path: artifacts/preflights/cohort_dedup/LATEST/decision.json

model:
  trunk:
    checkpoint: /media/mpascual/Sandisk2TB/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: ["wt"]
  vae_checkpoint: /media/mpascual/Sandisk2TB/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 50
  scheduler: polynomial

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 200
  max_epochs: 4
  batch_size: 1
  grad_accum: 1
  checkpoint_every_epochs: 1
  log_train_every_steps: 5
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0

validation:
  every_epochs: 1
  per_epoch_nfe: 5
  full_sweep_every_epochs: 5
  sweep_nfes: [1, 2, 5]
  qualitative_every_epochs: 10
  image_metrics: false

exhaustive_val:
  enabled: false

output:
  experiments_root: /media/mpascual/Sandisk2TB/research/vena/experiments
  retention_n_checkpoints: 5
  tensorboard: false
  wandb: false

regions:
  brain:
    source: fallback_all_ones
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
