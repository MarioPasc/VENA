# Resume-semantics smoke (Phase C — WARM_START).
#
# Different recipe tag from Phase A/B (smoke_resume → smoke_warm_dst) so the
# new run lands in its own dir; `resume_from: __BASELINE_RUN_ID__` is
# templated and gets rewritten in place before launch with the actual
# run_id produced by Phase A. The engine must:
#   * mint a NEW dir (different tag),
#   * inject `_WarmStartCallback` (logged at INFO),
#   * leave optimiser/EMA/scheduler/RNG fresh (the trainer.fit ckpt_path is None).
# decision.json must carry resume_mode=warm_start and resume_source_run_id
# equal to the Phase A run_id.

run:
  stage: s1
  tag: smoke_warm_dst
  resume_from: __BASELINE_RUN_ID__
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_server3.json
  fold: 0
  batch_size: 1
  num_workers: 2
  pin_memory: true
  tau: 0.5
  max_train_subjects: 4

model:
  trunk:
    checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: false
    regime: fft
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: []
  vae_checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 5
  scheduler: cosine

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 8
  max_epochs: 1
  batch_size: 1
  grad_accum: 1
  checkpoint_every_epochs: 1
  log_train_every_steps: 1
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 5]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: false

output:
  experiments_root: /media/hddb/mario/experiments/resume_smoke
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: fallback_all_ones
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
