# Full S1 config for server3 (icai-server) — 2× RTX 4090 24 GB.
# Target: 50 000 steps on fold-0 train (356 patients), batch 2, two GPUs DDP.
seed: 42
site: server3
stage: S1
artifact_root: /media/hddb/mario/artifacts/vena/fm.train
run_name: S1_full_fold0

data:
  latents_h5: /media/hddb/mario/data/GLIOMAS/UCSF_PDGM/h5/UCSFPDGM_latents.h5
  fold: 0
  batch_size: 2
  num_workers: 4
  pin_memory: true
  max_train_subjects: null

trunk:
  checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
  class_token: 9
  spacing_mm: [1.0, 1.0, 1.0]

controlnet:
  conditioning_inputs:
    - latent:t1pre
    - latent:t2
    - latent:flair
    - mask:wt:identity
  arch_overrides: {}
  perturb_keys: ["wt"]

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 1000
  scheduler: polynomial

trainer:
  max_steps: 50000
  precision: bf16-mixed
  devices: 2
  accelerator: gpu
  strategy: ddp_find_unused_parameters_true
  log_every_n_steps: 25
  gradient_clip_val: 1.0
  accumulate_grad_batches: 1
  deterministic: false
