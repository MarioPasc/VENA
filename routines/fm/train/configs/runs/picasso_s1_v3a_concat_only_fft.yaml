# Picasso — S1 v3 Variant A baseline (channel-concat at trunk, NO ControlNet).
#
# Diagnosis at .claude/notes/review/2026-06-22_s1_v2_tumor_synthesis_failure_diagnosis.md
# Spec at        .claude/notes/changes/2026-06-22_s1_v3_model_implementation.md
#
# Variant A — the literal T1C-RFlow architecture (channel-concat T1pre/T2/FLAIR
# into the trunk's first conv) with VENA's MAISI MR pretraining + offline aug
# on top. ControlNet is DROPPED entirely. Tests "does channel-concat alone fix
# the background-quality and visual enhancement gap?" — if A succeeds at
# PSNR_ET >= 18 dB by epoch 200 we save the ControlNet inference cost.
#
# Recipe deltas vs the S1 v2 baseline (picasso_s1_1000ep_fft.yaml):
#   * model.trunk.input_concat.enabled: true
#     cond_latents: [t1pre, t2, flair]                   — channel-concat at trunk
#     ⇒ trunk in_channels expanded 4 → 16 (zero-init for the new channels;
#     pretrained MAISI weights preserved for the original 4 channels)
#   * model.trunk.arch_overrides.in_channels: 16        — required cross-check
#   * model.controlnet.enabled: false                    — NO ControlNet at all
#   * model.controlnet.conditioning_inputs: []           — empty (Pydantic rejects
#     a non-empty list with enabled=false to prevent misconfiguration)
#   * loss.cfm.reduction: none                           — required for region weights
#   * loss.cfm.region_weights.enabled: true
#     {bg:1, bnwt:1, netc:50, ed:50, et:300}             — pushes WT-region L1
#     contribution from 0.095 % to ~17 % of total (diagnosis §3.1 / §6.2)
#
# Hardware: 4× A100 40 GB (cuda:0 training, cuda:1 async exhaustive val).
# Walltime: 7 days. EarlyStopping patience=250 epochs on train/total_epoch.
# Effective batch 8 (physical 4, grad_accum 2).
#
# Submit via:
#   sbatch routines/fm/train/slurm/runs/launcher_picasso_s1_v3a_fft.sh

run:
  stage: s1
  tag: v3a_concat_only_fft
  resume_from: baseline
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  batch_size: 4
  num_workers: 8
  pin_memory: true
  tau: 0.5
  augmentation_config_path: null
  preflight_decision_path: null
  dedup_decisions_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json
  use_offline_augmented_data: true
  variant_weights:
    v0: 0.2
    v1: 0.2
    v2: 0.2
    v3: 0.2
    v4: 0.2

model:
  trunk:
    checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    # Trunk in_channels widened from 4 to 16 by ``expand_conv_in`` (post-
    # ``_instantiate_trunk``). The new 12 input channels are zero-initialised
    # so the trunk's step-0 behaviour is bit-identical to the pretrained MAISI
    # baseline on the original 4 channels.
    arch_overrides:
      in_channels: 16
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
    regime: fft
    # S1 v3 — channel-concat conditioning at the trunk's first conv.
    input_concat:
      enabled: true
      cond_latents: [t1pre, t2, flair]
      cond_masks: []
      zero_init_new_channels: true
      ramp_steps: 0           # zero-init alone is enough for step-0 correctness
      ramp_steepness: 10.0
  controlnet:
    enabled: false            # Variant A — no ControlNet
    init_from_trunk: true     # ignored when enabled=false
    conditioning_inputs: []
    arch_overrides: {}
    perturb_keys: []
    output_scale_ramp: null   # no ControlNet ⇒ no output scale to ramp
  vae_checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    # 2026-06-22 (3-arm ablation): this is the architecture-only arm — channel-
    # concat at the trunk WITHOUT region-weighted loss. Pair-wise comparison
    # with `picasso_s1_v3b_concat_plus_cn3ch_fft.yaml` isolates the role of
    # the CN-on-masks branch; pair-wise comparison with
    # `picasso_s1_v3b_rw_concat_plus_cn3ch_fft.yaml` isolates the loss fix
    # contribution. Standard L1 mean reduction matches T1C-RFlow's exact
    # loss (Eidex 2025 — `F.l1_loss(v, (tgt - noise))`).
    reduction: mean
    norm: l1

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: logit-normal
  use_timestep_transform: true
  base_img_size_numel: 129024

optim:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 1000
  scheduler: cosine

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 400000
  max_epochs: 10000
  batch_size: 4
  grad_accum: 2
  checkpoint_every_epochs: 25
  log_train_every_steps: 100
  # Best-metric on `train/total_epoch` per `feedback_s3_monitor_pitfall` — the
  # ET trajectory is the load-bearing signal, read from
  # exhaustive_val/.../aggregate.csv by hand. The auto-rewire is deferred
  # (see plan §"Scope decisions").
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0
  patience: 250

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 2, 5, 10, 20]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: true
  every_epochs: 25
  n_patients: 60
  nfe_levels: [1, 2, 5, 10, 20]
  integrator: euler
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  device: cuda:1
  block_until_complete: false
  figure_top_k: 5

output:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: latents_h5
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
