# Picasso — S3 LPL Batch-2 Arm D: preflight-aligned feature depth (A=[2,3], standard).
#
# Design doc: .claude/notes/changes/lpl/2026-07-02_batch_2_lambda_calibration.md
# Prior batch analysis: .claude/notes/changes/lpl/2026-06-28_batch_1_default_recipe.md
# Skill: .claude/skills/lpl-journal/SKILL.md
#
# Rationale: the `decoder_lpl_profile` preflight (2026-06-18) measured per-
# block feature magnitudes on the frozen MAISI decoder and recommended
# A_recommended=[2, 3] with w_l={2: 0.6634227598538304, 3: 1.3365772401461697}.
# Production S3 (batch 1) overrode this to A=[2, 5] with w_l={2:1.0, 5:2.0}
# per design-doc §5.3's canonical-K=5 argument (cross-spatial-scale
# supervision). Batch 1 did not test the preflight recommendation.
#
# Block 3 sits at the level-0→1 upsample boundary and has the highest raw
# magnitude of any block (18.36 vs block-2's 9.17 and block-5's 8.34). The
# design doc explicitly excluded block 3 because "its magnitude spike
# produces noisy gradients". This arm tests whether that noise argument was
# empirically correct or overly conservative.
#
# B2-D vs B2-A isolates the feature-depth axis at fixed λ_max=0.30.
#
# Hypothesis (H4 in journal): using the preflight-recommended [2, 3] readout
# improves the LPL signal's independence from CFM. If B2-D ≥ B2-A on
# PSNR_ET, block-5 supervision is redundant with CFM.
#
# CAVEAT: LPL_raw at A=[2,3] is unmeasured. Batch-1 measured A=[2,5] → 2.28.
# Block 3 magnitude is 2× block 5 but preflight w_l normalises inversely
# (0.663 vs 1.337), so the two effects partially cancel. First epoch of the
# run should log the actual LPL_raw and the LPL share at steady state
# (`lam_active · train/lpl_epoch / train/total_epoch`).

run:
  stage: s3
  tag: b2_d_lambda030_preflight_A_fft
  resume_from: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments/2026-06-22_15-20-57_s1_v3b_rw_concat_plus_cn3ch_fft_320b5ddd/checkpoints/ema_best.ckpt
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  batch_size: 2
  num_workers: 8
  pin_memory: true
  tau: 0.5
  dedup_decisions_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json
  use_offline_augmented_data: true
  variant_weights:
    v0: 0.2
    v1: 0.2
    v2: 0.2
    v3: 0.2
    v4: 0.2
  decoder_lpl_decision_path: /mnt/home/users/tic_163_uma/mpascual/execs/vena/artifacts/preflights/decoder_lpl_profile/LATEST/decision.json

model:
  trunk:
    checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides:
      in_channels: 16
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
    regime: fft
    input_concat:
      enabled: true
      cond_latents: [t1pre, t2, flair]
      cond_masks: []
      zero_init_new_channels: true
      ramp_steps: 0
      ramp_steepness: 10.0
  controlnet:
    enabled: true
    init_from_trunk: false
    conditioning_inputs:
      - mask:netc:identity
      - mask:ed:identity
      - mask:et:identity
    arch_overrides: {}
    perturb_keys: []
    output_scale_ramp:
      enabled: false
      ramp_steps: 5000
      steepness: 10.0
  vae_checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: none
    norm: l1
    region_weights:
      enabled: true
      bg: 1.0
      brain_not_wt: 1.0
      netc: 50.0
      ed: 50.0
      et: 300.0
      wt: null
      threshold: 0.5
  lpl:
    # DELTA vs B2-A:
    #   A_override [2, 5] → [2, 3]
    #   w_l_override {2:1.0, 5:2.0} → {2:0.6634..., 3:1.3366...} (preflight)
    #   outlier_k_override keys shifted from 5 → 3
    # lambda_max, warmup, alpha unchanged (λ=0.30, warmup=30, standard α=(1,1)).
    schedule:
      kind: linear
      warmup_epochs: 30
      lambda_min: 0.0
      lambda_max: 0.30
    alpha_override:
      wt: 1.0
      notwt: 1.0
    A_override: [2, 3]
    w_l_override:
      2: 0.6634227598538304
      3: 1.3365772401461697
    outlier_k_override:
      2: 5.0
      3: 5.0
    soft_region: false
    grad_checkpoint_segments: 4

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: logit-normal
  use_timestep_transform: true
  base_img_size_numel: 129024

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 500
  scheduler: cosine

ema:
  decay: 0.999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 52000
  max_epochs: 250
  batch_size: 2
  grad_accum: 4
  checkpoint_every_epochs: 25
  log_train_every_steps: 100
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0
  patience: 100

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 2, 5, 10, 20]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: true
  every_epochs: 25
  # DELTA vs S3-C: n_patients 10 → 90 (per user request 2026-07-02). ~10/cohort.
  n_patients: 90
  nfe_levels: [1, 5, 20]
  integrator: euler
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  device: cuda:1
  python_executable: /mnt/home/users/tic_163_uma/mpascual/fscratch/conda_envs/vena/bin/python
  block_until_complete: true
  figure_top_k: 5
  export_per_block_figures: false

output:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: latents_h5
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
