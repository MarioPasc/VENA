# Picasso — 1000-epoch S1 baseline (FFT trunk + ControlNet, CFM-only loss).
#
# 2026-06-09 overhaul:
#   * LR scheduler -> cosine (was "polynomial" with total_steps=1e9 → no-op).
#   * Peak lr 1e-4 (was 5e-5; matches MAISI-V2 §4.1 + TumorFlow).
#   * total_steps pinned to the measured value: 208 steps/epoch × 1000 ep ≈ 208 000.
#     (Empirical: prior run logged 117 728 steps over 566 epochs = 208 steps/epoch.)
#
# Hardware: 2× A100 40 GB (cuda:0 training, cuda:1 async exhaustive val).
# Walltime: 7 days. EarlyStopping patience=100 epochs on train/total_epoch
# releases the allocation if the run plateaus before exhausting the budget.
# Effective batch 8 (physical 4, grad_accum 2) matches the Diffusers SDXL
# ControlNet sweet spot.
#
# Submit via:
#   bash routines/fm/train/slurm/runs/launcher_picasso_s1_fft.sh

run:
  stage: s1
  resume_from: latest
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  batch_size: 4
  num_workers: 8
  pin_memory: true
  tau: 0.5
  augmentation_config_path: routines/fm/train/configs/augmentations/equivariant_v1.yaml
  preflight_decision_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/latent_aug_equivariance/LATEST/decision.json
  dedup_decisions_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json
  use_offline_augmented_data: true
  variant_weights:
    v0: 0.2
    v1: 0.2
    v2: 0.2
    v3: 0.2
    v4: 0.2

model:
  trunk:
    checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
    regime: fft
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    # S1 has no contrastive term; perturb_keys is irrelevant but kept for
    # backward compat. CFG dropout (training.conditioning_dropout_p) drives
    # any conditioning ablation in the s2_cfg variant.
    perturb_keys: []
  vae_checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 1000
  scheduler: cosine

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  # 208 steps/epoch × 1000 epochs = 208 000. The cosine LR decay completes
  # over this window. Pin a comment when changing dataset size or batch:
  # steps_per_epoch ≈ Σ_c (N_c × variant_weight_sum_c) / batch_size / grad_accum.
  total_steps: 208000
  max_epochs: 1000
  batch_size: 4
  grad_accum: 2
  checkpoint_every_epochs: 25
  log_train_every_steps: 100
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0
  patience: 100

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 2, 5, 10, 20]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: true
  every_epochs: 50
  n_patients: 60
  nfe_levels: [1, 2, 5, 10, 20]
  integrator: euler
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  device: cuda:1
  block_until_complete: false
  figure_top_k: 3

output:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: fallback_all_ones
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
