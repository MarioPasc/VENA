# Picasso — 1000-epoch S2 with LoRA r=16 + v0.4 contrastive + CFG dropout.
#
# Identical to picasso_s2_1000ep_lora_r16.yaml plus classifier-free-guidance
# training-time dropout on the WT conditioning channel (Ho & Salimans 2022;
# ControlNet §3.5 / appendix A.2). p_drop=0.15 — below ControlNet's 0.5
# default because the WT mask is a much stronger condition than a text prompt
# and over-dropping would under-train the high-signal input.
#
# The CFG arm is identified post-hoc by `decision.json[conditioning_dropout_p] > 0`;
# the run.stage label stays "s2" so the existing per-cohort breakdown and the
# exhaustive-val gates compose unchanged.
#
# Submit via:
#   bash routines/fm/train/slurm/runs/launcher_picasso_s2_lora_cfg.sh

run:
  stage: s2
  # Recipe tag (schema 0.8.0). Same-recipe scoping for ``resume_from: latest``.
  # The trailing ``_cfg`` differentiates this CFG-dropout ablation from the
  # ``lora_r16_contrastive`` baseline so the two never collide on resume.
  tag: lora_r16_contrastive_cfg
  # BASELINE — explicit fresh start from MAISI base trunk + fresh LoRA adapters.
  # Walltime auto-resubmit is OFF (see picasso_s1_1000ep_fft.yaml note).
  resume_from: baseline
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  batch_size: 4
  num_workers: 8
  pin_memory: true
  tau: 0.5
  augmentation_config_path: routines/fm/train/configs/augmentations/equivariant_v1.yaml
  preflight_decision_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/latent_aug_equivariance/LATEST/decision.json
  dedup_decisions_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json
  use_offline_augmented_data: true
  variant_weights:
    v0: 0.2
    v1: 0.2
    v2: 0.2
    v3: 0.2
    v4: 0.2

model:
  trunk:
    checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
    regime: peft
    peft:
      variant: lora
      params:
        r: 16
        alpha: 16
        dropout: 0.0
        target_modules: ["to_q", "to_k", "to_v", "out_proj"]
        bias: "none"
        init_lora_weights: "gaussian"
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: []
  vae_checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2
  contrastive:
    # Two-term region-weighted Lp residual (same as picasso_s2_1000ep_lora_r16.yaml):
    #   * healthy p=3 — super-linear penalty on healthy residuals (CFM is
    #     already MSE over the whole volume; p=2 healthy would just upweight
    #     CFM, no qualitative change).
    #   * wt p=1 — linear MAE inside tumour; robust to the heterogeneous
    #     enhancement signature.
    weight: 0.1
    terms:
      - {name: healthy, region: healthy, p: 3.0, weight: 1.0}
      - {name: wt,      region: wt,      p: 1.0, weight: 1.0}

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: logit-normal

optim:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 1000
  scheduler: cosine

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 400000
  max_epochs: 10000
  batch_size: 4
  grad_accum: 2
  checkpoint_every_epochs: 25
  log_train_every_steps: 100
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0
  patience: 100
  # Classifier-free-guidance training-time dropout (per-sample Bernoulli).
  # `conditioning_dropout_p == 0` would byte-identically match s2_lora_r16.
  conditioning_dropout_p: 0.15
  conditioning_dropout_keys: ["wt"]

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 2, 5, 10, 20]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: true
  every_epochs: 25
  n_patients: 60
  nfe_levels: [1, 2, 5, 10, 20]
  integrator: euler
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  device: cuda:1
  block_until_complete: false
  figure_top_k: 5

output:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: latents_h5
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
