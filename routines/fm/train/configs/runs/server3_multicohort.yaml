# Multi-cohort unfrozen-trunk run (server3) — DUAL RTX 4090 24 GB.
# Pools UCSF-PDGM (n=495) and BraTS-GLI (n=1133 patients / 1251 scans) via
# CorpusRegistry + MultiCohortLatentDataModule with TemperatureBalancedSampler.
#
# batch_size=4 is CRITICAL: with exactly 2 cohorts and batch_size=2 the
# diversity constraint forces every batch to be 1+1 and τ is INERT — the
# temperature-weighted fill slots never fire because n_distinct==batch_size.
# batch_size>n_cohorts so the fill slots (batch_size - n_distinct = 2) carry
# the τ=0.5 signal and the sampler can up-weight the larger BraTS-GLI cohort.
#
# Training on cuda:0; exhaustive validation on cuda:1
# (launch with BOTH GPUs visible — do not set CUDA_VISIBLE_DEVICES).

run:
  stage: s1
  resume_from: null
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/glioma_preop_v1.json
  tau: 0.5
  fold: 0
  batch_size: 4
  num_workers: 4
  pin_memory: true
  max_train_patients_per_cohort: null

model:
  trunk:
    checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true          # unfrozen-trunk arm
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: ["wt"]
  vae_checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 100
  scheduler: polynomial

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 100000        # high cap; max_epochs governs this run
  max_epochs: 4
  batch_size: 4
  grad_accum: 2
  checkpoint_every_epochs: 1
  log_train_every_steps: 25
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0

validation:
  every_epochs: 1
  per_epoch_nfe: 5
  full_sweep_every_epochs: 5
  sweep_nfes: [1, 2, 5, 10, 50]
  qualitative_every_epochs: 10
  image_metrics: true

exhaustive_val:
  enabled: true
  every_epochs: 1
  n_patients: 10
  nfe_levels: [1, 10, 50]
  corpus_registry: routines/fm/train/configs/corpus/glioma_preop_v1.json
  device: cuda:1

output:
  experiments_root: /media/hddb/mario/experiments
  retention_n_checkpoints: 5
  tensorboard: false
  wandb: false

regions:
  brain:
    source: fallback_all_ones
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
