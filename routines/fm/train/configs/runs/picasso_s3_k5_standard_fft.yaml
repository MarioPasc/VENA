# Picasso — S3 LPL warm-started from S1, K=5 (canonical A=[2,5]), Standard LPL.
#
# Ablation row 3 of the 2026-06-19 four-job S3 study:
#   {K=2, K=5} × {Standard α=(1,1), Region α=(2,3)}
#
# K=5 here = design-note §5.3 canonical one-readout-per-scale (A=[2, 5]).
# Overrides the preflight's `A_recommended=[2, 3]` because the K=5 question is
# "does pushing the deeper readout from block 3 to block 5 (2× spatial, 128 ch
# instead of 256 ch) carry useful diagnostic signal?".
#
# VRAM ceiling: K=5 decoder ≈ 26 GB on A100 without grad-ckpt → overflows the
# 40 GB budget once the trunk+ControlNet load (~12 GB) is added. Therefore
# `grad_checkpoint_segments=2` is mandatory (segments=2 ≈ 8 GB peak, leaving
# ~20 GB headroom).
#
# Per-block feature-map figures (export_per_block_figures) are OFF for K=5 —
# the cuda:1 val-GPU also fits K=5 partial decode in isolation only at 29 GB
# (V100) / ~26 GB (A100), no headroom for the val workload itself.

run:
  stage: s3
  tag: lpl_k5_standard_fft_s1warm
  resume_from: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments/2026-06-12_01-27-55_s1_fft_cfm_c9b97556/checkpoints/ema_best.ckpt
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  batch_size: 2          # see training.batch_size note (2026-06-19 OOM fix)
  num_workers: 8
  pin_memory: true
  tau: 0.5
  # Re-run on the post-audit corpus (2026-06-19T14-59-38Z); SHA matches
  # corpus_picasso.json (b98be6f3...). Drops 293 UCSF-PDGM + 447 UPENN-GBM
  # patients that duplicate BraTS-GLI under brats21_id bridges.
  dedup_decisions_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json
  use_offline_augmented_data: true
  variant_weights:
    v0: 0.2
    v1: 0.2
    v2: 0.2
    v3: 0.2
    v4: 0.2
  decoder_lpl_decision_path: /mnt/home/users/tic_163_uma/mpascual/execs/vena/artifacts/preflights/decoder_lpl_profile/LATEST/decision.json

model:
  trunk:
    checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
    regime: fft
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: []
  vae_checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2
  lpl:
    schedule:
      kind: linear
      warmup_epochs: 30
      lambda_min: 0.0
      lambda_max: 1.0
    alpha_override:                 # Standard LPL
      wt: 1.0
      notwt: 1.0
    # K=5 — A=[2, 5] (design §5.3 canonical), max_block=5. Overrides
    # preflight A=[2, 3]. w_l from design-note §5.3 starting point
    # (w_5 = 2 × w_2 — UPWEIGHT the deeper, lower-channel block).
    A_override: [2, 5]
    w_l_override:
      2: 1.0
      5: 2.0
    outlier_k_override:
      2: 5.0
      5: 5.0
    soft_region: false
    # 2026-06-19: bumped segments 2 → 4. At segments=2 the K=5 backward
    # OOM'd by 306 MiB on every step (1010 silent skips in 40 min).
    # segments=4 halves the decoder activation graph footprint again.
    grad_checkpoint_segments: 4

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: logit-normal

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 500
  scheduler: cosine

ema:
  decay: 0.999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  # 2026-06-19: bs 4 → 2, grad_accum 2 → 4 (eff batch 8 preserved). Same
  # rationale as the K=2 YAMLs — A100 trunk saturation forces the bs cut.
  total_steps: 41600
  max_epochs: 200
  batch_size: 2
  grad_accum: 4
  checkpoint_every_epochs: 25
  log_train_every_steps: 100
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0
  patience: 30

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 2, 5, 10, 20]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: true
  every_epochs: 25
  n_patients: 10
  nfe_levels: [1, 5, 20]
  integrator: euler
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  device: cuda:1
  python_executable: /mnt/home/users/tic_163_uma/mpascual/fscratch/conda_envs/vena/bin/python
  block_until_complete: true
  figure_top_k: 5
  export_per_block_figures: false   # K=5 — OOM risk on val GPU

output:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: latents_h5
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
