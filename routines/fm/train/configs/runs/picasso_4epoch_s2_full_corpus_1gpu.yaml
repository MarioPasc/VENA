# Picasso 4-epoch S2 smoke — Lp-aware contrastive on the full corpus.
# **1-GPU variant**: exhaustive_val disabled to fit on a single A100, queue-friendly.
# Identical to picasso_4epoch_s2_full_corpus.yaml except for exhaustive_val.enabled.

run:
  stage: s2
  resume_from: null
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  batch_size: 2
  num_workers: 4
  pin_memory: true
  tau: 0.5
  augmentation_config_path: null
  preflight_decision_path: null
  dedup_decisions_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json

model:
  trunk:
    checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides: {}
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
  controlnet:
    conditioning_inputs:
      - latent:t1pre
      - latent:t2
      - latent:flair
      - mask:wt:identity
    arch_overrides: {}
    perturb_keys: ["wt"]
  vae_checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    reduction: mean
    norm: l2
  contrastive:
    weight: 0.01
    lambda_roi: 0.3
    lambda_bg: 1.0
    delta: 2.0
    p_t: 1.0
    p_b: 3.0

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: uniform

optim:
  lr: 5.0e-5
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 1000
  scheduler: polynomial

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 50000
  max_epochs: 4
  batch_size: 2
  grad_accum: 1
  checkpoint_every_epochs: 1
  log_train_every_steps: 25
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0

validation:
  every_epochs: 1
  per_epoch_nfe: 5
  full_sweep_every_epochs: 5
  sweep_nfes: [1, 2, 5, 10, 50]
  qualitative_every_epochs: 10
  image_metrics: true

# Disabled — single-GPU; the smoke goal is corpus + 4-epoch loop validation.
# Re-enable for the long run on a 2-A100 allocation.
exhaustive_val:
  enabled: false

output:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/fscratch/experiments/vena
  retention_n_checkpoints: 5
  tensorboard: false
  wandb: false

regions:
  brain:
    source: fallback_all_ones
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
