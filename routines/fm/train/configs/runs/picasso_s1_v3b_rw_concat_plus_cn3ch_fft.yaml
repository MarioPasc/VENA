# Picasso — S1 v3 Variant B + region-weighted L1 (full v3 recipe).
#
# Background: .claude/notes/review/2026-06-22_s1_v2_tumor_synthesis_failure_diagnosis.md
# Spec:        .claude/notes/changes/2026-06-22_s1_v3_model_implementation.md
#
# Third arm of the 2026-06-22 3-cell ablation. Same architecture as
# `picasso_s1_v3b_concat_plus_cn3ch_fft.yaml` (channel-concat at trunk +
# ControlNet on the 3-channel [NETC, ED, ET] soft mask), but **with the
# region-weighted L1 loss enabled** (et=300, netc=ed=50, bnwt=bg=1).
#
# The 3-cell design isolates the two independent failure modes the diagnosis
# identified (H6 architecture, H2 loss imbalance):
#
#   v3a (this dir, _concat_only_fft.yaml):           channel-concat, no CN, no RW
#   v3b (this dir, _concat_plus_cn3ch_fft.yaml):     + CN on masks, no RW
#   v3b_rw (THIS file):                              + CN on masks + region-weighted L1
#
# Pair-wise: v3a→v3b isolates CN-on-masks; v3b→v3b_rw isolates the RW loss
# fix. The diagnosis (§4 Operative chain) argues both H6 and H2 are
# load-bearing INDEPENDENTLY — predicts v3b_rw will beat v3b on PSNR_ET
# specifically. If v3b ≈ v3b_rw the RW recipe is unnecessary and the
# project ships v3b (saves the loss-side complexity).
#
# Hardware + wallclock: identical to v3a / v3b (4× A100 40 GB, 7d).
# Submit via:
#   sbatch routines/fm/train/slurm/runs/launcher_picasso_s1_v3b_rw_fft.sh

run:
  stage: s1
  tag: v3b_rw_concat_plus_cn3ch_fft
  resume_from: baseline
  seed: 1337
  device: cuda
  precision: bf16-mixed
  full_determinism: false

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  batch_size: 4
  num_workers: 8
  pin_memory: true
  tau: 0.5
  augmentation_config_path: null
  preflight_decision_path: null
  dedup_decisions_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json
  use_offline_augmented_data: true
  variant_weights:
    v0: 0.2
    v1: 0.2
    v2: 0.2
    v3: 0.2
    v4: 0.2

model:
  trunk:
    checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/diff_unet_3d_rflow-mr.pt
    arch_json: null
    arch_overrides:
      in_channels: 16
    class_token: 9
    spacing_mm: [1.0, 1.0, 1.0]
    trainable: true
    regime: fft
    input_concat:
      enabled: true
      cond_latents: [t1pre, t2, flair]
      cond_masks: []
      zero_init_new_channels: true
      ramp_steps: 0
      ramp_steepness: 10.0
  controlnet:
    enabled: true
    init_from_trunk: false
    conditioning_inputs:
      - mask:netc:identity
      - mask:ed:identity
      - mask:et:identity
    arch_overrides: {}
    perturb_keys: []
    output_scale_ramp:
      enabled: true
      ramp_steps: 5000
      steepness: 10.0
  vae_checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/NV-Generate-MR/models/autoencoder_v2.pt

loss:
  cfm:
    weight: 1.0
    # Region-weighted L1 — required reduction='none' so the per-voxel loss
    # tensor can be multiplied by the per-region weight before the
    # ``sum/sum`` reduction. Disabled in v3a/v3b for the ablation; ENABLED
    # here (et=300, netc/ed=50, bnwt=bg=1). Addresses the diagnosis §3.1
    # finding: WT contributes 0.095 % of the unweighted L1 mass and the
    # optimiser favours non-WT correctness by ~1047:1. With the v3 weights,
    # the WT contribution becomes ~17 % of total loss mass.
    reduction: none
    norm: l1
    region_weights:
      enabled: true
      bg: 1.0
      brain_not_wt: 1.0
      netc: 50.0
      ed: 50.0
      et: 300.0
      wt: null                # null = use per-sub-region weights
      threshold: 0.5

rflow:
  num_train_timesteps: 1000
  use_discrete_timesteps: true
  sample_method: logit-normal
  use_timestep_transform: true
  base_img_size_numel: 129024

optim:
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 1.0e-2
  warmup_steps: 1000
  scheduler: cosine

ema:
  decay: 0.9999
  update_after_step: 0
  update_every: 1
  inv_gamma: 10.0
  power: 1.0
  min_value: 0.0

training:
  total_steps: 400000
  max_epochs: 10000
  batch_size: 4
  grad_accum: 2
  checkpoint_every_epochs: 25
  log_train_every_steps: 100
  best_metric_name: mse_latent
  best_metric_region: bg
  best_metric_nfe: 5
  gradient_clip_val: 1.0
  patience: 250

validation:
  every_epochs: 0
  per_epoch_nfe: 5
  full_sweep_every_epochs: 999999
  sweep_nfes: [1, 2, 5, 10, 20]
  qualitative_every_epochs: 999999
  image_metrics: false

exhaustive_val:
  enabled: true
  every_epochs: 25
  n_patients: 60
  nfe_levels: [1, 2, 5, 10, 20]
  integrator: euler
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  device: cuda:1
  block_until_complete: false
  figure_top_k: 5

output:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments
  retention_n_checkpoints: 3
  tensorboard: false
  wandb: false

regions:
  brain:
    source: latents_h5
  wt:
    source: derived_from_tumor_latent
    threshold: 0.5
  wt_dilated:
    source: derived_via_scipy_binary_dilation
    structure: ones_3x3x3
  bg:
    source: derived
  vessel:
    source: skipped
