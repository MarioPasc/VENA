# UCSF-PDGM image-domain H5 cache — smoke run (schema 2.0.0).
#
# 8 patients at n_jobs=2: n_test_min=2 so 2 are held out and the remaining 6
# support 3-fold CV. Sanity-checks the converter (reorient, brain mask,
# crop/origin, CSR, quota splits) without the full ~500-patient sweep.

source_root: /media/mpascual/MeningD2/GLIOMA/UCSF_PDGM/source
metadata_csv: /media/mpascual/MeningD2/GLIOMA/UCSF_PDGM/metadata/UCSF-PDGM-metadata_v5.csv
output_path: /tmp/vena_smoke_h5/UCSFPDGM_image_smoke.h5

n_jobs: 2
crop_box: [192, 224, 192]
test_fraction: 0.10
n_test_min: 2
n_folds: 3
seed: 0
stratify_by: null

overwrite: true
limit: 8
log_level: INFO
