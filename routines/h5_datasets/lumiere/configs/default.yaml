# LUMIERE image-domain H5 cache — full conversion (schema 2.0.0).
#
# Output: MNI152-LPS (N, 182, 218, 182) tensors for t1pre / t1c / t2 / flair +
# DeepBraTumIA atlas tumour seg (BraTS-2023 labels {0,1,2,3}) + atlas brain
# mask; per-scan crop/origin for the common 192x224x192 box; CSR patient
# grouping (longitudinal-aware); patient-ID nested CV splits with a 10-patient
# held-out test cohort and 5-fold CV on the remaining 81.
#
# Runtime estimate: ~25-50 min on 8 CPU cores (~638 sessions x 6 NIfTI loads).

source_root: /media/mpascual/MeningD2/GLIOMA/LUMIERE/Imaging-v202211/Imaging
output_path: /media/mpascual/MeningD2/GLIOMA/LUMIERE/h5/LUMIERE_image.h5

n_jobs: 8
crop_box: [192, 224, 192]
test_fraction: 0.11
n_test_min: 10
n_folds: 5
seed: 42

overwrite: true
log_level: INFO
