# UPENN-GBM smoke conversion — first 4 patients to /tmp.
#
# Used to gate the converter on a local 4060 in < 2 min before launching
# the full 611-patient run.

source_root: /media/mpascual/MeningD2/GLIOMA/UPENN_GBM/PKG - UPENN-GBM-NIfTI/UPENN-GBM/NIfTI-files/images_structural
metadata_csv: /media/mpascual/MeningD2/GLIOMA/UPENN_GBM/metadata/UPENN-GBM_brats21_lookup_v1.csv
output_path: /tmp/vena_smoke_h5/upenn_gbm_image_smoke.h5

n_jobs: 2
shard_size: 4
crop_box: [192, 224, 192]
limit: 4

# Small N: 1 test patient + 2-fold CV (minimum required by make_cohort_splits).
test_fraction: 0.25
n_test_min: 1
n_folds: 2
seed: 42

overwrite: true
log_level: INFO
