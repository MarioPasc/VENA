vae_checkpoint: /media/mpascual/Sandisk2TB/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt

main_cohort_name: UCSF-PDGM
image_h5_main: /media/mpascual/MeningD2/GLIOMA/UCSF_PDGM/h5/UCSFPDGM_image.h5
n_patients_main: 4
patient_seed: 1337

smoke_cohorts: []

variants_to_test:
