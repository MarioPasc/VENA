# Default config for the venous-atlas build routine.
# Selects ~30 LGG (or low-MLS) subjects, registers their T1Gd to MNI152
# via ANTs SyN, averages a top-5% indicator inside a superior axial slab,
# thresholds at p≥0.5, drops small connected components, and writes the
# resulting binary mask + probability map under output_root/<UTC>/.

dataset_root: /media/mpascual/MeningD2/GLIOMA/UCSF_PDGM/source
metadata_csv: /media/mpascual/MeningD2/GLIOMA/UCSF_PDGM/metadata/UCSF-PDGM-metadata_v5.csv
atlases_root: /media/mpascual/Sandisk2TB/research/vena/atlases
cache_root:   /media/mpascual/Sandisk2TB/research/vena/cache/venous_atlas_build
output_root:  /media/mpascual/Sandisk2TB/research/vena/atlases/venous_inhouse

n_subjects: 30
who_grade_max: 2          # null → ignore WHO grade filter
midline_shift_mm_max: 3.0 # midline-shift proxy hard cap (mm)

intensity_percentile: 95.0
axial_slab_z_mni: [25.0, 80.0]  # superior slab in MNI152 mm
voting_threshold: 0.5
min_component_size: 100

seed: 1337
n_workers: 1
log_level: INFO
