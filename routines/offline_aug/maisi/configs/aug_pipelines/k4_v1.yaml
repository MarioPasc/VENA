# Offline-augmentation pipeline — K=4 (v1, v2, v3, v4) — VENA v1.
#
# Each block defines a *variant*. The bank-builder samples per-row a single
# variant and applies its composed transforms (TorchIO + the MONAI
# RandHistogramShift adapter). Per-transform probabilities here are the
# probability of firing **inside** the variant; the chance of the variant
# being selected at training time is configured in the FM trainer YAML
# under `data.variant_weights`.
#
# Default hyperparameters are the refined-proposal defaults. Any key not
# listed here falls back to the per-variant defaults baked into
# `vena.data.augment.offline.variants`.

schema_version: "0.1.0"
name: "k4_v1"
description: >
  Four nuisance axes: v1 field/scanner (inputs-only bias + gamma),
  v2 contrast-shape (inputs-only histogram remap + brightness/contrast),
  v3 SNR/resolution (inputs-only noise + anisotropy + blur + low-p motion),
  v4 anatomy (joint elastic + small-angle affine on inputs + target + mask).

variants:
  v1:
    bias_order: 3
    bias_coefficients: [-0.5, 0.5]
    gamma_log_range: [-0.3, 0.3]
    gamma_prob: 0.5
  v2:
    hist_shift_n_control_low: 8
    hist_shift_n_control_high: 12
    brightness_contrast_log_range: [-0.15, 0.15]
    brightness_contrast_prob: 0.4
  v3:
    noise_std: [0.0, 0.05]
    anisotropy_axes: [0, 1, 2]
    anisotropy_downsampling: [1.5, 4.0]
    anisotropy_prob: 0.7
    blur_std: [0.0, 1.5]
    blur_prob: 0.4
    motion_translation: 5.0
    motion_degrees: 5.0
    motion_num_transforms: [1, 3]
    motion_prob: 0.1
  v4:
    elastic_num_control_points: 7
    elastic_max_displacement: 4.0
    elastic_locked_borders: true
    # Probabilities at 1.0 so v4 always perturbs (the previous 0.7 × 0.7
    # left ~9% of v4 rows byte-identical to the source — see commit notes).
    elastic_prob: 1.0
    affine_scales: [0.9, 1.1]
    affine_degrees: 10.0
    affine_translation_voxels: 8.0
    affine_prob: 1.0
