# Default configuration for vena-segmentation-train.
#
# Shape: SegmentationConfig (vena.segmentation.config).
# All top-level keys must match the Pydantic model exactly (extra="forbid").
# Override on Picasso with a runs/picasso_seg_*.yaml file.
#
# Channel semantics: channel-0 = TC (NETC+ET, edema excluded), channel-1 = NETC.
# TC − NETC = ET (reported diagnostic, never gated).

model:
  # Primary arm: UKB-pretrained BSF-SwinUNETR (leak-free headline).
  # BraTS-SSL arm leaks BraTS-GLI + T1ce; never use as headline.
  name: bsf_swinunetr_ukb
  feature_size: 48
  in_channels: 3            # t1pre + t2 + flair
  out_channels: 2           # channel-0 = TC, channel-1 = NETC
  # Absolute Picasso checkpoint path.  Must be the UKB-SSL checkpoint
  # (BrainSegFounder_SSL_UKBiobank/64-gpu-model_bestValRMSE.pt).
  checkpoint: /mnt/home/users/tic_163_uma/mpascual/fscratch/checkpoints/BrainSegFounder_SSL_UKBiobank/64-gpu-model_bestValRMSE.pt
  strict_load: false        # encoder-only; 182/198 keys load (0.919 coverage)
  deep_supervision: true    # DS weights applied during training

data:
  corpus_registry: routines/fm/train/configs/corpus/corpus_picasso.json
  # image_h5_root is set but each cohort's image_h5 path in the registry
  # takes precedence (nine cohorts live in nine different subdirectories).
  image_h5_root: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/vena
  modalities: [t1pre, t2, flair]    # must match in_channels=3
  k_folds: 5
  fold_seed: 1337
  fm_fold: 0                # must match the FM generator's fold (v3a used fold-0)
  dedup_decision_path: /mnt/home/users/tic_163_uma/mpascual/fscratch/artifacts/preflights/cohort_dedup/LATEST/decision.json
  patch_size: [96, 96, 96]  # multiple of feature_size=48; fits in 40 GB A100
  cache_rate: 0.0           # no CPU caching (H5 read ≈ 0.40 s/sample is fast)
  num_workers: 8

targets:
  soft: true
  sdt_sigma_vox: 3.0
  netc_operator: euclidean_percomponent
  clip_vox: 10.0
  tumor_region: tc          # TC = NETC+ET; edema (label=2) excluded

loss:
  dice_variant: dml         # DML Dice (task 13)
  ce_variant: ce
  dice_weight: 1.0
  ce_weight: 1.0
  deep_supervision_weights: [1.0, 0.5, 0.25]

train:
  max_epochs: 300
  lr: 1.0e-4
  batch_size: 2
  optimizer: adamw
  scheduler: cosine
  amp: true
  val_every_epochs: 5       # balance between feedback frequency and overhead
  early_stop_patience: 30
  calibration_split_frac: 0.1   # all-train model: fraction held out for ES

derivation:
  temperature: none         # Q5: calibration is MEASURED, never corrected
  avg_pool_stride: 4        # matches MAISI 4× spatial compression
  latent_grid: [48, 56, 48] # verified latent grid (base_img_size_numel=129024)
  emit_variance: false

metrics:
  gseg_tc_dice: 0.75        # PROVISIONAL — re-derive from S5 measured TC Dice
  gseg_netc_dice: 0.50
  selection_metric: dual    # harmonic mean of Dice + Brier (B.f-§7)

run:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments_seg
  tag: ukb_k5
  fold: 0                   # override per SLURM array task (0-4, or "all_train")
  seed: 1337
  device: cuda
  log_level: INFO
  resume_from: null

viz:
  enabled: true
  every_epochs: 10
  n_patients: 5
  n_cols: 10
  patient_ids: null
  gt_alpha: 0.6
  soft_alpha: 0.6

seed: 1337
