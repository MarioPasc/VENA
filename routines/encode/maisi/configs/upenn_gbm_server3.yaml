# MAISI encode — UPENN-GBM full cohort, server3 (icai-server) paths.
#
# Normalisation/precision are kept IDENTICAL to the UCSF-PDGM / BraTS-GLI
# server3 encodes (fp32 inference + percentile [0, 99.95] + foreground-only).
# This is mandatory for cross-cohort latent comparability — the FM model
# trains on all three cohorts' latents, so a different intensity scale or VAE
# precision would be a domain confound (see .claude/rules/model-coding-standards.md §15).
#
# UPENN-GBM ships no clinical CSV with WHO grade; the only metadata field on
# the image H5 is metadata/brats21_id (drives the cohort_dedup bridge against
# BraTS-GLI). who_grade-dependent QC passes (stabilization) are disabled.
# Roundtrip QC is ENABLED on 4 patients to gate the encode before we trust it.

source_image_h5: /media/hddb/mario/data/GLIOMAS/upenn_gbm/h5/UPENN-GBM_image.h5
autoencoder_checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt
output_dir: /media/hddb/mario/results/vena/encode_upenn_gbm_maisi
output_h5_path: /media/hddb/mario/data/GLIOMAS/upenn_gbm/h5/UPENN-GBM_latents.h5

modalities: [t1pre, t1c, t2, flair]
device: cuda

# Precision — match UCSF/BraTS-GLI server3 encode (fp32, no autocast).
precision_mode: fp32
autoencoder_norm_float16: null

inference_mode: auto
depth_pad_base: 8

sliding_window:
  roi_size: [80, 80, 32]
  overlap: 0.4
  mode: gaussian

# Intensity normalisation — match UCSF/BraTS-GLI server3 encode EXACTLY.
percentile_lower: 0.0
percentile_upper: 99.95
percentile_foreground_only: true

mask_downsampler:
  name: per_class_avg_pool
  params: {}

limit: null
encode_full_cohort: true
checkpoint_every: 50
resume_from_run_id: null
overwrite: false
log_level: INFO
seed: 42

# Roundtrip QC on a 4-patient sample to gate the encode.
roundtrip:
  enabled: true
  n_patients: 4
  modalities: [t1pre, t1c, t2, flair]

# who_grade-dependent QC disabled (UPENN-GBM has no clinical metadata).
stabilization:
  enabled: false

pca:
  enabled: true
  figure_filename: pca.png
  pooling: global_avg
  n_components: 2
