# MAISI encode — REMBRANDT full cohort, server3 (icai-server) paths.
#
# Normalisation/precision match UCSF-PDGM + BraTS-GLI + IvyGAP server3 encodes:
# fp32 + percentile [0, 99.95] + foreground-only — mandatory for cross-cohort
# latent comparability. REMBRANDT has no clinical CSV column to stratify on,
# so the roundtrip QC takes the first N patients (same path used for IvyGAP).

source_image_h5: /media/hddb/mario/data/GLIOMAS/rembrandt/h5/REMBRANDT_image.h5
autoencoder_checkpoint: /media/hddb/mario/checkpoints/MAISI_V2_RM/NV-Generate-MR/models/autoencoder_v2.pt
output_dir: /media/hddb/mario/results/vena/encode_rembrandt_maisi
output_h5_path: /media/hddb/mario/data/GLIOMAS/rembrandt/h5/REMBRANDT_latents.h5

modalities: [t1pre, t1c, t2, flair]
device: cuda

precision_mode: fp32
autoencoder_norm_float16: null

inference_mode: auto
depth_pad_base: 8

sliding_window:
  roi_size: [80, 80, 32]
  overlap: 0.4
  mode: gaussian

percentile_lower: 0.0
percentile_upper: 99.95
percentile_foreground_only: true

mask_downsampler:
  name: per_class_avg_pool
  params: {}

limit: null
encode_full_cohort: true
checkpoint_every: 25
resume_from_run_id: null
overwrite: false
log_level: INFO
seed: 42

# Roundtrip QC: grade-less fallback (first 4 patients of t1pre/t1c/t2/flair).
roundtrip:
  enabled: true
  figure_filename: roundtrip.png
  n_patients: 4
  modalities: [t1pre, t1c, t2, flair]

# Stratified stabilisation needs who_grade — disabled.
stabilization:
  enabled: false

pca:
  enabled: true
  figure_filename: pca.png
  pooling: global_avg
  n_components: 2
