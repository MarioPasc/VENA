# Picasso A100 full pGAN training — multi-cohort, fair-comparison with VENA's
# routines/fm/train/configs/runs/picasso_s1_1000ep_fft.yaml.
#
# Reads the same corpus registry VENA uses (corpus_picasso.json: 6 cv cohorts —
# UCSF-PDGM + BraTS-GLI + UPENN-GBM + IvyGAP + LUMIERE + REMBRANDT), same fold,
# same seed, same epoch cap, same patience. Total fold-0 train union ≈ 1698
# patients (vs single-cohort UCSF-PDGM = 356).
#
# Paired comparison axes:
#   seed=1337, fold=0, max_epochs=10000, patience=100, walltime 7d, batch 4,
#   workers 8, checkpoint every 25 epochs.
#
# Competitor-internal hyperparams stay at Dar et al. 2019 §3 defaults.
runtime:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments/competitors/pgan_cgan
  platform: picasso
  tag: full_multicohort
  gpu_ids: [0]
  seed: 1337

data:
  corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  input_modalities: [t1pre, t2, flair]
  target_modality: t1c
  image_size: 256
  min_brain_voxels: 1000
  max_patients_per_cohort: null   # use the full fold-0 train union per cohort

hp:
  input_nc: 3
  output_nc: 1
  ngf: 64
  ndf: 64
  n_layers_D: 3
  norm: instance
  init_type: normal
  no_dropout: false
  pool_size: 0
  lambda_A: 100.0
  lambda_vgg: 100.0
  lambda_adv: 1.0
  lr: 0.0002
  beta1: 0.5
  lr_policy: lambda
  lr_decay_iters: 50
  epoch_count: 1
  niter: 5000
  niter_decay: 5000
  batchSize: 4
  save_epoch_freq: 25
  log_every: 200
  num_workers: 8
  max_epochs: 10000
  patience: 100
