# Picasso A100 — pGAN flair → t1c (paper-faithful, one-to-one). Mirror of
# picasso_full_t1pre.yaml with input_modalities flipped to FLAIR.
runtime:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments/competitors/pgan_cgan
  platform: picasso
  tag: full_flair_t1c
  gpu_ids: [0]
  seed: 1337

data:
  corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  input_modalities: [flair]
  target_modality: t1c
