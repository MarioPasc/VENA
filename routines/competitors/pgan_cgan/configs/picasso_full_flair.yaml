  lambda_adv: 1.0
  lr: 0.0002
  beta1: 0.5
  lr_policy: lambda
  lr_decay_iters: 50
  epoch_count: 1
  niter: 2
  niter_decay: 2
  batchSize: 32
  save_epoch_freq: 1
  log_every: 200
  num_workers: 8
  max_epochs: 4
  patience: 0
