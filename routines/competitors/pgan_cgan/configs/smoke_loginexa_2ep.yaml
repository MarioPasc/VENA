# Multi-cohort smoke on Picasso loginexa V100 interactive node.
# Reads VENA's Picasso corpus registry (6 cv cohorts), 1 patient per cohort.
# Uses the sibling env `vena-v100` (torch 2.7.1+cu126, sm_70 compatible).
runtime:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/VENA/experiments/competitors/pgan_cgan
  platform: loginexa
  tag: smoke_4ep_multicohort
  gpu_ids: [0]
  seed: 1337

data:
  corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  input_modalities: [t1pre, t2, flair]
  target_modality: t1c
  image_size: 256
  min_brain_voxels: 1000
  max_patients_per_cohort: 1

hp:
  input_nc: 3
  output_nc: 1
  ngf: 64
  ndf: 64
  n_layers_D: 3
  norm: instance
  init_type: normal
  no_dropout: false
  pool_size: 0
  lambda_A: 100.0
  lambda_vgg: 100.0
  lambda_adv: 1.0
  lr: 0.0002
  beta1: 0.5
  lr_policy: lambda
  lr_decay_iters: 50
  epoch_count: 1
  niter: 1            # 1 epoch constant LR
  niter_decay: 1      # 1 epoch decay  →  2 epochs total (V100 ~5 min budget)
  batchSize: 1
  save_epoch_freq: 1
  log_every: 50
  num_workers: 0  # see server-3 config for rationale
  max_epochs: 2
  patience: 0
