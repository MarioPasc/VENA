# Picasso A100 — SynDiff t1pre → t1c (paper-faithful, one-to-one).
# Bidirectional cycle trains 8 networks jointly; only gen_diffusive_1 (target←source)
# is used at inference. Per paper §IV.B: 50 epochs, A100 expected ~24-48 h.
runtime:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments/competitors/syndiff
  platform: picasso
  tag: full_t1pre_t1c
  gpu_ids: [0]
  seed: 1337

data:
  corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  source_modality: t1pre
  target_modality: t1c
  image_size: 256
  min_brain_voxels: 1000
  max_patients_per_cohort: null

hp:
  # NCSN++ trunk (README values)
  num_channels_dae: 64
  ch_mult: [1, 1, 2, 2, 4, 4]
  num_res_blocks: 2
  attn_resolutions: [16]
  dropout: 0.0
  embedding_type: positional
  nz: 100
  z_emb_dim: 256
  t_emb_dim: 256
  n_mlp: 3
  ngf: 64
  # Diffusion schedule (paper §IV.B)
  num_timesteps: 4
  beta_min: 0.1
  beta_max: 20.0
  # Optimisation (README example)
  lr_g: 1.6e-4
  lr_d: 1.0e-4
  beta1: 0.5
  beta2: 0.9
  r1_gamma: 1.0
  lazy_reg: 10
  lambda_l1_loss: 0.5
  use_ema: true
  ema_decay: 0.999
  no_lr_decay: false
  # Training schedule — paper budget is 50 epochs
  max_epochs: 1
  patience: 0          # no early-stop (short fixed schedule)
  save_epoch_freq: 1
  log_every: 200
  batch_size: 4        # A100 40GB; >1 deviates from paper but keeps step budget feasible
  num_workers: 8
