# 3D-Latent-Pix2Pix (Isola 2017 + Eidex 2025 §4) — multi-cohort smoke on
# the Picasso loginexa V100 interactive node (V100-DGXS-32GB, sm_70).
#
# Uses the `vena-v100` env (torch 2.7.1+cu126). Reads VENA's Picasso corpus
# registry via the shared Lustre mount.
runtime:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments/competitors/lpix2pix_3d
  platform: loginexa
  tag: smoke_2ep_multicohort
  gpu_ids: [0]
  seed: 1337

data:
  corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  input_latents: [t1pre, flair]
  target_latent: t1c
  max_patients_per_cohort: 1

hp:
  # Generator: paper-faithful MAISI 3-level U-Net (~25M params on latent (4,48,56,48)).
  latent_channels: 4
  cond_latents: 2
  # PatchGAN discriminator.
  disc_ndf: 64
  disc_num_layers: 4
  # Pix2Pix loss + optimisation (Isola §3.2 + vendored code).
  lambda_l1: 100.0
  lr_g: 1.0e-4
  lr_d: 1.0e-4
  beta1: 0.5
  beta2: 0.999
  weight_decay: 1.0e-4
  batch_size: 1
  max_epochs: 2
  patience: 0
  save_epoch_freq: 1
  log_every: 5
  num_workers: 0   # multi-cohort h5py + multiprocessing deadlock guard
  use_amp: true
