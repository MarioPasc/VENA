# Picasso A100 full 3D-LDDPM training — multi-cohort, fair-comparison with
# VENA's routines/fm/train/configs/runs/picasso_s1_1000ep_fft.yaml.
#
# Reads the same corpus registry VENA uses (corpus_picasso.json: 6 cv cohorts —
# UCSF-PDGM + BraTS-GLI + UPENN-GBM + IvyGAP + LUMIERE + REMBRANDT), same fold,
# same seed, same patience strategy.
#
# Paired-comparison axes (match VENA's reference run on the matchable ones):
#   seed=1337, fold=0, batch=4, workers=8, checkpoint every 25 epochs.
#
# Paper-budget fairness (skill §3.11, locked 2026-06-15):
#   The Eidex 2025 paper trained ALL its baselines (DDPM, Pix2pix, DiT-3D,
#   T1C-RFlow) on the same BraTS-2024 budget: 2,860 train samples × 100
#   epochs = 286,000 sample exposures. Our multi-cohort train union has
#   1,751 latent volumes/epoch. To match the paper's data exposure:
#       max_epochs = ceil(286,000 / 1,751) ≈ 164.
#   This is the same cap T1C-RFlow and DiT-3D use — keeps the three
#   Eidex-2025 baselines on identical budgets so their head-to-head numbers
#   are comparable.
#   `patience: 0` because the budget is deliberately fixed.
#
# Competitor-internal hyperparameters:
#   * Backbone: paper-faithful MAISI U-Net — num_channels=[128, 128, 256],
#     3 levels, 2 res-blocks per level, no self-attention. IDENTICAL to the
#     T1C-RFlow wrapper so the only competitor-internal delta is the
#     scheduler/loss form.
#   * Scheduler: DDPM (Ho et al. 2020) — num_train_timesteps=1000,
#     beta_start=0.0015, beta_end=0.0195, schedule="scaled_linear_beta",
#     clip_sample=False. Mirrors upstream train_ddpm.py:113-119 exactly.
#   * Loss: MSE noise-prediction (F.mse_loss(eps_pred, eps)) — standard
#     Ho et al. 2020 epsilon-prediction loss.
#   * Optimiser: AdamW(lr=1e-5, wd=1e-4, betas=(0.9, 0.999)).
#   * AMP: enabled (upstream code-faithful).
#   * No EMA, no gradient clipping, no augmentation — paper-faithful.
#
# Citations: Ho, J., Jain, A., & Abbeel, P. "Denoising Diffusion Probabilistic
# Models." NeurIPS 2020. arXiv:2006.11239. Eidex, Z. et al. "An Efficient 3D
# Latent Diffusion Model for T1-contrast Enhanced MRI Generation."
# arXiv:2509.24194, 2025.
runtime:
  experiments_root: /mnt/home/users/tic_163_uma/mpascual/execs/vena/experiments/competitors/lddpm_3d
  platform: picasso
  tag: full_multicohort
  gpu_ids: [0]
  seed: 1337

data:
  corpus_registry: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA/routines/fm/train/configs/corpus/corpus_picasso.json
  fold: 0
  input_latents: [t1pre, flair]
  target_latent: t1c
  max_patients_per_cohort: null   # full fold-0 train union per cohort

hp:
  latent_channels: 4
  cond_latents: 2
  num_train_timesteps: 1000
  beta_start: 0.0015
  beta_end: 0.0195
  beta_schedule: scaled_linear_beta
  clip_sample: false
  lr: 1.0e-5
  weight_decay: 1.0e-4
  batch_size: 4
  max_epochs: 164
  patience: 0
  save_epoch_freq: 25
  log_every: 200
  num_workers: 8
  use_amp: true
