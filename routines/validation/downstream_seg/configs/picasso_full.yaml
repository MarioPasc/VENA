# Downstream-seg FULL SWEEP config (§4.4) — all 16 methods × all 9 cohorts.
#
# Single monolithic GPU job: the engine computes the real arm ONCE per scan
# and reuses it across every method (n_real_arm_unique_calls == n_scans), so the
# full sweep is ~727 real + 16×727 synth ≈ 12.4k segmenter passes (~7 GPU-h on
# one A100). No sharding/merge needed — the engine does the full patient-collapse
# + Holm aggregate in one run.
#
# selection_nfe_only: true → each method scored only at its pre-registered NFE.
# VENA-S1-v3a is included so the oracle-mask confound (§4b) is reported next to
# every VENA-S1-v3b-rw number.
#
# Run from fscratch/repos/VENA-validation (a real git repo) so git_sha resolves.
# Corpus H5 paths verified on Picasso 2026-07-18: all carry masks/tumor with a
# label_system attr (UCSF-PDGM/UPENN-GBM/IvyGAP/REMBRANDT = BraTS2021 {1,2,4};
# LUMIERE/BraTS-Africa-*/BraTS-PED = BraTS2023 {1,2,3}). BraTS-PED additionally
# carries stray label 4 — its Ring-B ET-Dice is interpretation-limited anyway
# (BraTS-pretrained instrument degrades on pediatric OOD, §5).

