  LUMIERE:   /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/vena/lumiere/h5/LUMIERE_image.h5
  IvyGAP:   /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/vena/ivy_gap/h5/IvyGAP_image.h5

