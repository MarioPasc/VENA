# Downstream-seg SMOKE config — IvyGAP 34 scans x C0-Identity NFE=1.
# Target: < 15 min on one A100.
#
# --- C0-Identity semantics (IMPORTANT) ---
# C0-Identity is the NULL FLOOR: T̂1c ≡ T1pre (pre-contrast copy, no enhancement).
# It does NOT copy the real T1c.  Sources: Results README line 181,
# identity_adapter.py:60-67, proposal §2 table.
#
# Canaries (stop and investigate if these fail):
#
#   1. Channel-order probe (observed 2026-07-16, IvyGAP 5 scans):
#      Dice_real WT  ≈ 0.77–0.96  (near-zero → INPUT_CHANNELS order wrong)
#      Dice_real TC  ≈ 0.38–0.96  (outliers expected for infiltrating tumours)
#      Dice_real ET  ≈ 0.85–0.95  (IvyGAP GBMs strongly enhance; NaN only for
#                                   non-enhancing cases not present here)
#
#   2. Mask join proof (independent of segmenter):
#      For each scan_id, Dice(corpus masks/tumor > 0, reference masks/wt) ≈ 1.0.
#      Run as a standalone h5py check against the shard reference H5 before
#      interpreting any Dice numbers.  Near-zero means the scan_id join is
#      broken or the two H5s come from different build pipelines.
#      Observed 2026-07-16: Dice = 1.000 for all 5 IvyGAP scans. ✓
#
#   3. C0 delta direction (engine convention: delta = Dice_real − Dice_synth):
#      delta_et for C0-Identity must be LARGE and POSITIVE (observed: 0.85–0.90).
#      delta_wt must be small-positive (< 0.05); delta_tc medium-positive (0.1–0.35).
#      C0 must have the LARGEST delta among all methods — it is the worst synthesizer.
#      T1pre carries no gadolinium-enhancement signal, so the segmenter
#      sees no enhancing rim: Dice_synth_ET ≈ 0, Dice_real_ET ≈ 0.85–0.95.
#      A delta_et near 0 would indicate an error (e.g. T1pre ≈ T1c —
#      biologically impossible for IvyGAP GBMs).
#
# Paths from corpus_picasso.json (source of truth — dir names are lowercase).
# ring_partitions_bootstrap.json is used until vena-validation-preregister lands;
# it derives Ring A (role=cv) / Ring B (role=test_only) from corpus_picasso.json.

