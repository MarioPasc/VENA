output_root:    /mnt/home/users/tic_163_uma/mpascual/execs/vena/inference/analyses

bundle_path:    /mnt/home/users/tic_163_uma/mpascual/fscratch/bundles/brats_mri_segmentation

corpus_map:
  IvyGAP: /mnt/home/users/tic_163_uma/mpascual/fscratch/datasets/vena/ivy_gap/h5/IvyGAP_image.h5

ring_partitions_path: /mnt/home/users/tic_163_uma/mpascual/execs/vena/inference/analyses/preregister/LATEST/ring_partitions.json

# C0-Identity SELECTION_NFE = 1 → engine discovers nfe_001.h5
