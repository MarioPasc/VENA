# Spatial residual — fast real-data smoke, selection NFEs only.
# C0-Identity: nfe_001 only (127 scans)
# VENA-S1-v3b-rw: nfe_005 only (127 scans)
# C5-T1C-RFlow: nfe_005 only (127 scans)
# Total: 381 scans × ~2.75s ≈ 17 min.
# Convergence check already captured in prior run at 2026-07-16T19-18-05Z.

inference_root: /media/mpascual/Sandisk2TB/research/vena/results/fm/inference
output_root: /media/mpascual/Sandisk2TB/research/vena/results/fm/inference/analyses

methods:
  - VENA-S1-v3b-rw
  - C0-Identity
  - C5-T1C-RFlow

cohorts:
  - UCSF-PDGM
  - LUMIERE
  - IvyGAP

# C0 only has nfe_001; VENA/RFlow selection_nfe=5.
# This yields exactly 3 files per method × 3 cohorts = 9 files, 381 scans.
nfes: [1, 5]

dilate_k: 5
n_shuffles: 5
n_boot: 10
rng_seed: 42
mi_n_voxels: 30000
n_deciles: 10

vena_method: VENA-S1-v3b-rw

scan_limit: null
run_convergence_check: false

log_level: INFO
