# Per-project config for the global `test-picasso-loginexa` skill.
# Schema: see ~/.claude/skills/test-picasso-loginexa/SKILL.md §"Project configuration".

repo_path_remote: /mnt/home/users/tic_163_uma/mpascual/fscratch/repos/VENA
python_interpreter: /mnt/home/users/tic_163_uma/mpascual/fscratch/conda_envs/vena/bin/python

# Smoke command template. {python} = python_interpreter, {config} = config path.
# The canonical FM trainer takes a single positional YAML.
smoke_cmd_template: '{python} -m routines.fm.train.cli {config}'

# 25 min to leave margin under the 30-min loginexa wallclock.
wallclock_budget_minutes: 25

loginexa_log_dir: ~/execs/VENA/logs

# Run-dir discovery — FM trainer creates a timestamped subdir here.
experiments_root: /mnt/home/users/tic_163_uma/mpascual/fscratch/experiments/VENA

pass_criteria:
  # The FM trainer prints this when training completes successfully.
  log_pattern: 'FM-train completed'
  # All must exist for PASS (use {run_dir} placeholder).
  required_artifacts:
    - '{run_dir}/checkpoints/last.ckpt'
    - '{run_dir}/metrics/train_step.csv'
    - '{run_dir}/decision.json'
  # CSV must have at least 1 row beyond header (catches silent-fail subprocess trap).
  required_csv_min_rows:
    '{run_dir}/metrics/train_step.csv': 1
  # FAIL if any of these appear in the log.
  forbidden_log_patterns:
    - 'Traceback'
    - 'CUDA out of memory'
    - 'PreflightGateError'

# pgrep -f anchor. `vena/bin/python` prefix skips bash watchdog matches.
process_anchor: 'vena/bin/python -m routines.fm.train.cli'

# Poll cadence while the smoke runs. 90s is fine for a 25-min budget.
poll_interval_seconds: 90

# Default to GPU 0 on loginexa. Override for dual-GPU smokes if VENA's
# async exhaustive-val needs both V100s.
default_cuda_visible_devices: '0'
